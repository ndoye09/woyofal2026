name: 'woyofal_dbt'
version: '1.0.0'
config-version: 2

profile: 'woyofal'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  woyofal_dbt:
    +materialized: view
    +schema: analytics
    
    staging:
      +materialized: view
      +schema: staging
      
    marts:
      +materialized: table
      +schema: marts
      
    tests:
      +schema: tests

vars:
  start_date: '2026-01-01'
  end_date: '2026-12-31'

on-run-start:
  - "{{ log('Starting dbt run for Woyofal Data Platform', info=True) }}"

on-run-end:
  - "{{ log('dbt run completed successfully', info=True) }}"
