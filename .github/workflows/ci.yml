name: Woyofal CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/woyofal

jobs:
  # ───────────────────────────────────────────────────────────────
  lint-frontend:
    name: 🔍 Lint & Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Vite (production)
        run: npm run build

  # ───────────────────────────────────────────────────────────────
  test-backend:
    name: 🧪 Tests Backend Flask
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api/flask

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: woyofal_test
          POSTGRES_USER: woyofal_user
          POSTGRES_PASSWORD: woyofal2026
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: woyofal_test
      DB_USER: woyofal_user
      DB_PASSWORD: woyofal2026
      SECRET_KEY: ci_secret_key
      JWT_SECRET_KEY: ci_jwt_key
      FLASK_ENV: testing

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: api/flask/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=. --cov-report=xml
        continue-on-error: true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: api/flask/coverage.xml

  # ───────────────────────────────────────────────────────────────
  validate-data:
    name: 📊 Validation données
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pandas
        run: pip install pandas numpy

      - name: Vérifier la structure du projet
        run: |
          python - <<'PY'
          import os
          checks = [
            'frontend-react/src/App.jsx',
            'api/flask/app.py',
            'api/flask/routes/auth.py',
            'api/flask/routes/ai.py',
            'docker-compose.yml',
            'sql/10_create_users_table.sql',
          ]
          missing = [f for f in checks if not os.path.exists(f)]
          if missing:
              print('Fichiers manquants:', missing)
              raise SystemExit(1)
          print('✅ Structure du projet valide')
          PY

  # ───────────────────────────────────────────────────────────────
  build-docker:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    needs: [lint-frontend, test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: ./api/flask
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-react
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────────
  security-scan:
    name: 🔒 Scan sécurité (Trivy)
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan — API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:latest
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH

      - name: Upload résultats au Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif
