name: CI/CD Woyofal

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests & Quality Checks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Setup Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: |
        pytest tests/ -v --cov=scripts --cov-report=xml --cov-report=term
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  validate-data:
    name: Data Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Setup Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        pip install pandas numpy
    - name: Check data structure
      run: |
        python - <<'PY'
        import os
        required_files = [
          'scripts/data_generation/generate_zones.py',
          'scripts/data_generation/generate_users.py',
          'scripts/data_generation/generate_consumption.py',
          'scripts/data_generation/generate_recharges.py'
        ]
        missing = [f for f in required_files if not os.path.exists(f)]
        if missing:
            print('Missing:', missing)
            raise SystemExit(1)
        print('✅ All required scripts present')
        PY

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Check Docker Compose
      run: |
        if [ -f docker-compose.yml ]; then
          echo "✅ docker-compose.yml found"
          docker-compose config
        else
          echo "⚠️ docker-compose.yml not found"
        fi
