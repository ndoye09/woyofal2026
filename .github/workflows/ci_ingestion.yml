name: CI - Ingestion Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-ingestion:
    name: Test Ingestion Pipeline
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install -U pip
        pip install pandas psycopg2-binary pytest

    - name: Start Postgres service
      uses: docker://postgres:14-alpine
      with:
        args: sleep 1

    - name: Create schema
      env:
        PGPASSWORD: woyofal2026
      run: |
        docker run --rm --name woyofal-postgres \
          -e POSTGRES_DB=woyofal_dwh -e POSTGRES_USER=woyofal_user -e POSTGRES_PASSWORD=woyofal2026 \
          -d postgres:14-alpine
        sleep 10
        docker exec woyofal-postgres psql -U woyofal_user -d woyofal_dwh -f sql/01_create_schema.sql

    - name: Run ingestion script presence check
      run: |
        test -f scripts/etl/load_to_warehouse.py && echo "✅ Script ingestion présent"
